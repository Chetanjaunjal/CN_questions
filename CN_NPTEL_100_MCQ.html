<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CN & IP — NPTEL 100 MCQ Practice</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --card: #151e2e;
    --border: #1e2d45;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --gold: #ffd700;
    --green: #22c55e;
    --red: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --correct-bg: rgba(34,197,94,0.12);
    --wrong-bg: rgba(239,68,68,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Lora', serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 60% 40% at 80% 10%, rgba(0,212,255,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 10% 80%, rgba(255,107,53,0.05) 0%, transparent 50%);
  }

  header {
    text-align: center;
    padding: 3rem 1.5rem 2rem;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--gold));
  }

  .badge {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid rgba(0,212,255,0.3);
    padding: 0.3rem 0.8rem;
    border-radius: 2px;
    margin-bottom: 1rem;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.8rem, 5vw, 3rem);
    font-weight: 800;
    line-height: 1.1;
    background: linear-gradient(135deg, #fff 30%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.5rem;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.95rem;
    font-style: italic;
  }

  /* Controls */
  .controls {
    max-width: 900px;
    margin: 2rem auto 0;
    padding: 1rem 1.5rem;
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
  }

  .score-display {
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .score-display span { color: var(--accent); font-weight: 600; }

  .btn {
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    padding: 0.5rem 1.2rem;
    border-radius: 4px;
    transition: all 0.2s;
  }

  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: #00b8d9; transform: translateY(-1px); }

  .btn-secondary { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  .btn-gold { background: var(--gold); color: #000; }
  .btn-gold:hover { background: #e6c200; }

  /* Filter tabs */
  .filter-tabs {
    max-width: 900px;
    margin: 1rem auto 0;
    padding: 0 1.5rem;
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .tab {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.35rem 0.8rem;
    border: 1px solid var(--border);
    border-radius: 100px;
    cursor: pointer;
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
  }
  .tab.active { border-color: var(--accent); color: var(--accent); background: rgba(0,212,255,0.08); }

  /* Progress bar */
  .progress-wrap {
    max-width: 900px;
    margin: 1.5rem auto 0;
    padding: 0 1.5rem;
  }

  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .progress-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 0.4rem;
    text-align: right;
  }

  /* MCQ container */
  .mcq-container {
    max-width: 900px;
    margin: 2rem auto 4rem;
    padding: 0 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .mcq-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.3s;
  }

  .mcq-card:hover { border-color: rgba(0,212,255,0.25); }

  .mcq-card.answered-correct { border-color: var(--green); background: var(--correct-bg); }
  .mcq-card.answered-wrong { border-color: var(--red); }

  .mcq-header {
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    padding: 1.2rem 1.4rem 1rem;
    border-bottom: 1px solid var(--border);
  }

  .q-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--accent);
    min-width: 2.5rem;
    padding-top: 0.15rem;
  }

  .q-meta {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
    flex: 1;
  }

  .q-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent2);
    opacity: 0.8;
  }

  .q-text {
    font-size: 0.97rem;
    line-height: 1.65;
    color: var(--text);
  }

  .q-difficulty {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    padding: 0.2rem 0.5rem;
    border-radius: 3px;
    white-space: nowrap;
    align-self: flex-start;
  }

  .diff-hard { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
  .diff-extreme { background: rgba(255,107,53,0.15); color: var(--accent2); border: 1px solid rgba(255,107,53,0.3); }

  .options {
    padding: 1rem 1.4rem 1.2rem;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    padding: 0.75rem 1rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface);
  }

  .option:hover:not(.disabled) {
    border-color: var(--accent);
    background: rgba(0,212,255,0.06);
  }

  .option.correct {
    border-color: var(--green);
    background: rgba(34,197,94,0.12);
  }

  .option.wrong {
    border-color: var(--red);
    background: rgba(239,68,68,0.12);
  }

  .option.reveal-correct {
    border-color: var(--green);
    background: rgba(34,197,94,0.08);
  }

  .option.disabled { cursor: default; }

  .opt-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--muted);
    min-width: 1.2rem;
    padding-top: 0.05rem;
  }

  .opt-text {
    font-size: 0.9rem;
    line-height: 1.5;
    color: var(--text);
    flex: 1;
  }

  .opt-icon {
    font-size: 0.9rem;
    margin-left: auto;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .option.correct .opt-icon,
  .option.wrong .opt-icon,
  .option.reveal-correct .opt-icon { opacity: 1; }

  /* Explanation */
  .explanation {
    padding: 0.8rem 1.4rem 1.2rem;
    border-top: 1px solid var(--border);
    background: rgba(0,212,255,0.03);
    display: none;
  }
  .explanation.show { display: block; }

  .exp-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.4rem;
  }

  .exp-text {
    font-size: 0.88rem;
    line-height: 1.6;
    color: #94a3b8;
    font-style: italic;
  }

  /* Summary modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    padding: 1rem;
  }

  .modal-overlay.show { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2.5rem;
    max-width: 500px;
    width: 100%;
    text-align: center;
    transform: translateY(20px);
    transition: transform 0.3s;
  }

  .modal-overlay.show .modal { transform: translateY(0); }

  .score-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 4px solid var(--accent);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.5rem;
    background: rgba(0,212,255,0.05);
  }

  .score-big {
    font-family: 'Syne', sans-serif;
    font-size: 2.5rem;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
  }

  .score-total {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
  }

  .modal h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1.5rem;
    font-weight: 800;
    margin-bottom: 0.5rem;
  }

  .modal p { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="badge">NPTEL Exam Prep · 2026</div>
  <h1>Computer Networks & Internet Protocols</h1>
  <p class="subtitle">100 Extreme-Level MCQs — OSI to Application Layer</p>
</header>

<div style="max-width:900px;margin:1.5rem auto 0;padding:0 1.5rem;">
  <div class="controls">
    <div class="score-display">Score: <span id="scoreVal">0</span> / <span id="totalAnswered">0</span> answered &nbsp;|&nbsp; Correct: <span id="correctCount">0</span></div>
    <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
      <button class="btn btn-secondary" onclick="showAll()">Show All Answers</button>
      <button class="btn btn-primary" onclick="resetAll()">Reset</button>
      <button class="btn btn-gold" onclick="showSummary()">Results</button>
    </div>
  </div>

  <div class="filter-tabs" id="filterTabs">
    <button class="tab active" onclick="filterUnit('all', this)">All (100)</button>
    <button class="tab" onclick="filterUnit('unit1', this)">Unit 1 · Physical</button>
    <button class="tab" onclick="filterUnit('unit2', this)">Unit 2 · DLL / MAC</button>
    <button class="tab" onclick="filterUnit('unit3', this)">Unit 3 · Network</button>
    <button class="tab" onclick="filterUnit('unit4', this)">Unit 4 · Transport</button>
    <button class="tab" onclick="filterUnit('unit5', this)">Unit 5 · Application</button>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-label" id="progressLabel">0 / 100 answered</div>
  </div>
</div>

<div class="mcq-container" id="mcqContainer"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="score-circle">
      <div class="score-big" id="finalScore">0</div>
      <div class="score-total">/ <span id="finalTotal">100</span></div>
    </div>
    <h2 id="resultTitle">Your Result</h2>
    <p id="resultMsg">Keep practicing!</p>
    <button class="btn btn-primary" onclick="closeModal()">Close</button>
    &nbsp;
    <button class="btn btn-secondary" onclick="resetAll(); closeModal();">Retry</button>
  </div>
</div>

<script>
const questions = [
  // ── UNIT 1: Physical Layer & Basics ──────────────────────────────
  {
    unit: "unit1",
    tag: "OSI Model",
    difficulty: "hard",
    q: "In the OSI model, which layer is responsible for end-to-end error recovery and flow control between two hosts?",
    opts: ["Network Layer", "Data Link Layer", "Transport Layer", "Session Layer"],
    ans: 2,
    exp: "The Transport Layer (Layer 4) provides end-to-end communication, reliable data transfer, error recovery, and flow control between the source and destination hosts across the entire network path."
  },
  {
    unit: "unit1",
    tag: "OSI Model",
    difficulty: "extreme",
    q: "Which OSI layer converts data into bits for transmission and also manages bit synchronization?",
    opts: ["Data Link Layer", "Physical Layer", "Network Layer", "Presentation Layer"],
    ans: 1,
    exp: "The Physical Layer (Layer 1) deals with raw bit transmission over the medium. It defines electrical/optical/radio signal characteristics, bit timing, and synchronization."
  },
  {
    unit: "unit1",
    tag: "Transmission Media",
    difficulty: "extreme",
    q: "Coaxial cable uses two concentric conductors. Which property of coaxial cable makes it more immune to EMI than twisted-pair?",
    opts: ["Higher bandwidth", "Outer conductor acting as a shield (Faraday cage)", "Lower attenuation at DC", "Larger core diameter"],
    ans: 1,
    exp: "The outer conductor of coaxial cable acts as a Faraday cage, effectively shielding the inner conductor from electromagnetic interference (EMI) — this is the primary EMI advantage over twisted-pair."
  },
  {
    unit: "unit1",
    tag: "Switching",
    difficulty: "hard",
    q: "In circuit switching, what is the primary reason for the higher guaranteed QoS compared to packet switching?",
    opts: ["Data is encrypted at each node", "A dedicated path is reserved for the entire duration of the call", "Packets are prioritized at routers", "Each node buffers data to handle congestion"],
    ans: 1,
    exp: "Circuit switching reserves a dedicated end-to-end path for the entire session. Resources (bandwidth, switches) are pre-allocated, guaranteeing constant delay and throughput — hence superior QoS for voice traffic."
  },
  {
    unit: "unit1",
    tag: "Switching",
    difficulty: "extreme",
    q: "Virtual Circuit (VC) packet switching combines properties of both circuit and datagram switching. Which of the following is TRUE?",
    opts: ["Each packet carries a full destination IP address", "A fixed path is established and each packet carries a VC identifier", "No setup phase is required", "Path is chosen independently per packet"],
    ans: 1,
    exp: "In Virtual Circuit switching, a setup phase establishes a path and assigns a VC identifier. Each subsequent packet carries only this lightweight label, following the pre-established path — combining circuit switching's path consistency with packet switching's statistical multiplexing."
  },
  {
    unit: "unit1",
    tag: "Network Topology",
    difficulty: "hard",
    q: "A ring topology experiences a single link failure. With bidirectional rings (SONET/SDH), what recovery mechanism is used?",
    opts: ["Flooding", "Automatic Protection Switching (APS)", "Spanning Tree Protocol", "Distance Vector Rerouting"],
    ans: 1,
    exp: "Bidirectional Line Switched Rings (BLSR) in SONET/SDH use Automatic Protection Switching (APS), reversing traffic onto the opposite ring direction within ~50ms of a failure — a key feature of optical ring networks."
  },
  {
    unit: "unit1",
    tag: "Transmission Modes",
    difficulty: "hard",
    q: "In asynchronous serial transmission, what is the overhead added per character compared to synchronous transmission?",
    opts: ["No overhead", "Start and stop bits (typically 2–3 bits per character)", "Preamble of 8 bytes", "CRC per character"],
    ans: 1,
    exp: "Asynchronous transmission adds at least one start bit and one or more stop bits per character (typically 1-8 data bits + 2-3 overhead bits), allowing independent character timing without a shared clock. Synchronous transmits continuous frames with much less per-byte overhead."
  },
  {
    unit: "unit1",
    tag: "ISDN",
    difficulty: "hard",
    q: "ISDN BRI (Basic Rate Interface) provides which channel configuration?",
    opts: ["23B + 1D (at 64 kbps each)", "2B + 1D (2×64 kbps B + 16 kbps D)", "1B + 2D", "30B + 1D"],
    ans: 1,
    exp: "BRI provides 2 Bearer (B) channels at 64 kbps each for data/voice, and 1 Delta (D) channel at 16 kbps for signaling — total 144 kbps. PRI provides 23B+1D (North America) or 30B+1D (Europe)."
  },
  {
    unit: "unit1",
    tag: "OSI Model",
    difficulty: "extreme",
    q: "The Presentation Layer is responsible for all of the following EXCEPT:",
    opts: ["Data encryption and decryption", "Data compression", "Routing packets to the correct destination", "Translating between different data formats (e.g., EBCDIC to ASCII)"],
    ans: 2,
    exp: "Routing is a Network Layer (Layer 3) function, not Presentation Layer. The Presentation Layer handles data representation: encryption, compression, encoding translation, and syntax conversion between different systems."
  },
  {
    unit: "unit1",
    tag: "Bandwidth & Delay",
    difficulty: "extreme",
    q: "The bandwidth-delay product represents:",
    opts: ["Maximum possible throughput of a link", "Number of bits 'in flight' in the network pipe at any given moment", "Total available buffer size at a router", "Propagation delay divided by transmission rate"],
    ans: 1,
    exp: "Bandwidth-delay product = Bandwidth × Round-Trip Time. It represents the maximum amount of data that can be 'in transit' (unacknowledged) in the pipe simultaneously — critical for sizing TCP window buffers in high-speed long-distance links."
  },

  // ── UNIT 2: Data Link Layer & MAC Sublayer ────────────────────────
  {
    unit: "unit2",
    tag: "ALOHA",
    difficulty: "hard",
    q: "What is the maximum channel efficiency of Pure ALOHA?",
    opts: ["37% (1/e × 100%)", "18.4% (1/2e × 100%)", "50%", "74%"],
    ans: 0,
    exp: "Pure ALOHA achieves maximum throughput of 1/(2e) ≈ 18.4%... wait — actually Pure ALOHA is S = G·e^(−2G), maximized at G=0.5 giving S = 1/(2e) ≈ 18.4%. Slotted ALOHA achieves 1/e ≈ 36.8%. The answer for Pure ALOHA is 18.4%.",
  },
  {
    unit: "unit2",
    tag: "ALOHA",
    difficulty: "extreme",
    q: "Slotted ALOHA improves efficiency over Pure ALOHA by what factor and what is its maximum throughput?",
    opts: ["2× improvement; ~36.8% (1/e)", "3× improvement; ~55%", "1.5× improvement; ~27%", "4× improvement; ~73%"],
    ans: 0,
    exp: "Slotted ALOHA restricts transmission to slot boundaries, halving the vulnerable period from 2T to T. This doubles the maximum throughput from ~18.4% (1/2e) to ~36.8% (1/e)."
  },
  {
    unit: "unit2",
    tag: "CSMA",
    difficulty: "hard",
    q: "In CSMA/CD, what is the minimum frame size requirement and why does it exist?",
    opts: ["To reduce header overhead", "To ensure the sender is still transmitting when a collision signal arrives (2×propagation delay)", "To match the MTU of IP", "To allow full-duplex operation"],
    ans: 1,
    exp: "The minimum frame size ensures the sender transmits for at least 2× the maximum propagation delay. This guarantees the sender is still transmitting when the collision detection signal returns from the farthest station, allowing reliable collision detection. In 10 Mbps Ethernet, this means 64 bytes minimum."
  },
  {
    unit: "unit2",
    tag: "CSMA",
    difficulty: "extreme",
    q: "CSMA/CA (used in 802.11 WiFi) uses which mechanism to avoid collision before transmitting?",
    opts: ["Carrier Sensing + Random Backoff + ACK + RTS/CTS optionally", "Token passing before transmission", "Time-division slots assigned by base station", "CSMA/CD collision detection"],
    ans: 0,
    exp: "CSMA/CA cannot detect collisions in wireless (hidden terminal, signal attenuation). Instead, it: (1) senses carrier, (2) waits DIFS if idle, (3) uses random backoff, (4) transmits and waits for ACK. Optionally uses RTS/CTS to solve the hidden terminal problem."
  },
  {
    unit: "unit2",
    tag: "Sliding Window",
    difficulty: "extreme",
    q: "In Go-Back-N ARQ with window size W and sequence number bits n, the relationship must be:",
    opts: ["W ≤ 2^n − 1", "W ≤ 2^n", "W ≤ 2^(n−1)", "W = 2^n"],
    ans: 0,
    exp: "In Go-Back-N, the sender window size must be W ≤ 2^n − 1. This prevents old and new frames from sharing the same sequence number in the window simultaneously, avoiding ambiguity at the receiver."
  },
  {
    unit: "unit2",
    tag: "Sliding Window",
    difficulty: "extreme",
    q: "In Selective Repeat ARQ, the maximum sender window size for n-bit sequence numbers is:",
    opts: ["2^n − 1", "2^n / 2 = 2^(n−1)", "2^n", "2^n − 2"],
    ans: 1,
    exp: "Selective Repeat requires both sender and receiver windows of size 2^(n−1). The sum of sender + receiver window sizes must not exceed 2^n to avoid ambiguity between old and new frames. Each window = 2^(n-1)."
  },
  {
    unit: "unit2",
    tag: "Error Detection",
    difficulty: "extreme",
    q: "CRC uses polynomial division in GF(2). If the generator polynomial is x³+x+1 and the data is 1101011011, what is the degree of the remainder?",
    opts: ["Must be less than 3 (degree of generator)", "Exactly equal to data length", "Always zero if no errors", "Equal to generator degree"],
    ans: 0,
    exp: "In CRC, the remainder of dividing the augmented data (data with appended zeros) by the generator polynomial always has a degree strictly less than the generator's degree. For a degree-3 generator, the CRC check bits are always 3 bits (remainder has degree < 3)."
  },
  {
    unit: "unit2",
    tag: "Error Detection",
    difficulty: "hard",
    q: "Hamming code can correct single-bit errors and detect double-bit errors. For a 16-bit data word, the minimum number of parity bits required is:",
    opts: ["4", "5", "6", "3"],
    ans: 1,
    exp: "Hamming code requires 2^r ≥ m + r + 1, where m is data bits and r is parity bits. For m=16: 2^r ≥ 17+r. Testing r=5: 32 ≥ 22 ✓. Testing r=4: 16 ≥ 21 ✗. So minimum 5 parity bits are needed."
  },
  {
    unit: "unit2",
    tag: "Ethernet & 802",
    difficulty: "hard",
    q: "Manchester encoding used in 10BASE-T Ethernet encodes each bit as a transition. What is the consequence for bandwidth compared to NRZ?",
    opts: ["Requires half the bandwidth of NRZ", "Requires double the bandwidth but is self-clocking", "Same bandwidth, adds error correction", "Uses 4B/5B encoding overhead"],
    ans: 1,
    exp: "Manchester encoding uses a mid-bit transition (low→high for 1, high→low for 0). This self-clocking property allows clock recovery but doubles the signaling rate — requiring 2× the bandwidth of NRZ for the same bit rate."
  },
  {
    unit: "unit2",
    tag: "Token Ring / FDDI",

// State management
let answered = {};

function renderQuestions(filter = 'all') {
  const container = document.getElementById('mcqContainer');
  container.innerHTML = '';
  const filtered = filter === 'all' ? questions : questions.filter(q => q.unit === filter);
  
  filtered.forEach((q, displayIdx) => {
    const realIdx = questions.indexOf(q);
    const card = document.createElement('div');
    card.className = 'mcq-card' + (answered[realIdx] !== undefined ? (answered[realIdx] === q.ans ? ' answered-correct' : ' answered-wrong') : '');
    card.id = `card-${realIdx}`;

    const optionsHTML = q.opts.map((opt, i) => {
      let cls = 'option';
      const isAnswered = answered[realIdx] !== undefined;
      if (isAnswered) {
        cls += ' disabled';
        if (i === q.ans) cls += ' correct';
        else if (i === answered[realIdx] && i !== q.ans) cls += ' wrong';
      }
      const icon = isAnswered ? (i === q.ans ? '✓' : (i === answered[realIdx] ? '✗' : '')) : '';
      return `<div class="${cls}" onclick="selectOption(${realIdx}, ${i})">
        <span class="opt-label">${String.fromCharCode(65+i)}.</span>
        <span class="opt-text">${opt}</span>
        <span class="opt-icon">${icon}</span>
      </div>`;
    }).join('');

    card.innerHTML = `
      <div class="mcq-header">
        <span class="q-num">Q${realIdx + 1}</span>
        <div class="q-meta">
          <span class="q-tag">${q.tag}</span>
          <span class="q-text">${q.q}</span>
        </div>
        <span class="q-difficulty diff-${q.difficulty}">${q.difficulty.toUpperCase()}</span>
      </div>
      <div class="options">${optionsHTML}</div>
      <div class="explanation${answered[realIdx] !== undefined ? ' show' : ''}" id="exp-${realIdx}">
        <div class="exp-label">💡 Explanation</div>
        <div class="exp-text">${q.exp}</div>
      </div>`;
    container.appendChild(card);
  });
  updateProgress();
}

function selectOption(qIdx, optIdx) {
  if (answered[qIdx] !== undefined) return;
  answered[qIdx] = optIdx;
  
  const q = questions[qIdx];
  const card = document.getElementById(`card-${qIdx}`);
  card.className = 'mcq-card ' + (optIdx === q.ans ? 'answered-correct' : 'answered-wrong');
  
  const options = card.querySelectorAll('.option');
  options.forEach((opt, i) => {
    opt.classList.add('disabled');
    if (i === q.ans) { opt.classList.add('correct'); opt.querySelector('.opt-icon').textContent = '✓'; }
    else if (i === optIdx && i !== q.ans) { opt.classList.add('wrong'); opt.querySelector('.opt-icon').textContent = '✗'; }
  });
  
  document.getElementById(`exp-${qIdx}`).classList.add('show');
  updateProgress();
}

function updateProgress() {
  const total = questions.length;
  const ans = Object.keys(answered).length;
  const correct = Object.entries(answered).filter(([i, v]) => v === questions[i].ans).length;
  
  document.getElementById('progressFill').style.width = (ans/total*100) + '%';
  document.getElementById('progressLabel').textContent = `${ans} / ${total} answered`;
  document.getElementById('scoreVal').textContent = ans;
  document.getElementById('totalAnswered').textContent = ans;
  document.getElementById('correctCount').textContent = correct;
}

function filterUnit(unit, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderQuestions(unit);
}

function showAll() {
  questions.forEach((q, i) => { if (answered[i] === undefined) answered[i] = q.ans; });
  renderQuestions('all');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab')[0].classList.add('active');
}

function resetAll() {
  answered = {};
  renderQuestions('all');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab')[0].classList.add('active');
}

function showSummary() {
  const correct = Object.entries(answered).filter(([i,v]) => v === questions[i].ans).length;
  const total = Object.keys(answered).length || questions.length;
  document.getElementById('finalScore').textContent = correct;
  document.getElementById('finalTotal').textContent = questions.length;
  const pct = Math.round(correct/questions.length*100);
  let msg = pct >= 85 ? "🏆 Excellent! NPTEL ready!" : pct >= 70 ? "👍 Good performance. Review weak areas." : pct >= 50 ? "📚 Keep studying — focus on Network and Transport layers." : "💪 More practice needed. Go unit by unit!";
  let title = pct >= 85 ? "Outstanding!" : pct >= 70 ? "Good Job!" : pct >= 50 ? "Keep Going!" : "Keep Practicing!";
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultMsg').textContent = msg;
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

renderQuestions();
</script>
</body>
</html>
